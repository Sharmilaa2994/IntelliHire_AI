<!DOCTYPE html>

<html>

<head>

<title>IntelliHire AI</title>
<div id="clock"></div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">

</head>
<script>

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=

now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

</script>
<body>

<div class="container">

<div data-aos="fade-down">

<h1> Candidate Screening</h1>

<p id="typing"></p>

</div>

<div class="card p-4" data-aos="zoom-in">

<form action="/predict" method="POST">

<input class="form-control mb-3" type="number" name="cgpa" placeholder="CGPA" required>

<input class="form-control mb-3" type="number" name="tech" placeholder="Technical Skill" required>

<input class="form-control mb-3" type="number" name="aptitude" placeholder="Aptitude" required>

<input class="form-control mb-3" type="number" name="communication" placeholder="Communication" required>

<input class="form-control mb-3" type="number" name="projects" placeholder="Projects" required>

<input class="form-control mb-3" type="number" name="certifications" placeholder="Certifications" required>

<input class="form-control mb-3" type="number" name="github" placeholder="Github Score" required>

<input class="form-control mb-3" type="number" name="linkedin" placeholder="LinkedIn Score" required>

<button class="btn btn-primary w-100">

Analyze Candidate

</button>

</form>

</div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init();

</script>
<script>

let text=

"AI Powered Candidate Screening System";

let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById("typing")

.innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,60);

}

}

typeWriter();

</script>

</body>

</html>
